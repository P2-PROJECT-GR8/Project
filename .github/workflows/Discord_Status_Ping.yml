name: Discord Label Ping
on:
  issues:
    types: [labeled]

jobs:
  ping_discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Review Ping
        if: github.event.label.name == 'status: review'
        run: |
          curl -H "Content-Type: application/json" -X POST \
          -d '{"content": "👀 Et issue er nu i **Review**! @here"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send Final Review Ping
        if: github.event.label.name == 'status: final-review'
        run: |
          curl -H "Content-Type: application/json" -X POST \
          -d '{"content": "🚨 **FINAL REVIEW**! @everyone"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
