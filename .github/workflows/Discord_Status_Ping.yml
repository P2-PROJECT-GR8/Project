permissions:
  repository-projects: read

name: Notify Discord on Status Change
on:
  project_card:
    types: [moved, edited]

jobs:
  check_status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Anbefales at bruge en specifik version, f.eks. '3.10' eller '3.11'

      - name: Install Python dependencies
        # Dit script bruger 'requests', så det skal installeres.
        run: pip install requests

      - name: Run Python script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # GitHub sender data om hvad der blev ændret i 'github.event'
          PROJECT_DATA: ${{ toJson(github.event) }}
        run: python notify_status.py