<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/landing.css" />
  <body>
    <div class="dashboard">
      <div class="box">
        <div class="login" id="login">
          <div id="formContainer">
            <label for="username"><b>Login here</b></label>
          <form>
            <input
              class="username"
              type="text"
              id="usernameInput"
              placeholder="Enter Username"
              name="username"
              required
              minlength="2"
              size="20"
            />
            <button type="submit" class="button" id="LoginBtn">Login</button>
            <button class="button" id="createSession">Create Session</button>
            <nav>
              <a href="../register/index.html" class="register-link">Not in the DB? Register here</a>
            </nav>
            <p id="ErrorMsg" class="error"></p>
            </form>
            <script src="../../js/login.js" type="module"></script>
        </div>
        </div>
      </div>
    </div>
  </body>
</html>
