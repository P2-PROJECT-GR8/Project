<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/header.css" />
    <link rel="stylesheet" href="../../css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <title>Document</title>
  </head>
  <body>

      <a href="/" id="logo">

    <div class="dashboard-container">
      <div class="sidebar">
        <nav>
          <h2>File Vault</h2>
          <ul>
            <li>
              <a href="#files"><i class="material-icons">folder</i>All Files</a>
            </li>
            <li>
              <a href="#documents"
                ><i class="material-icons">article</i>Documents</a
              >
            </li>
            <li>
              <a href="#media"><i class="material-icons">image</i>Media</a>
            </li>
            <li>
              <a href="#archive"
                ><i class="material-icons">inventory_2</i>Archives</a
              >
            </li>
            <li>
              <a href="#trash"><i class="material-icons">delete</i>Trash</a>
            </li>
          </ul>
          <button id="share-file-btn" style="display: none">
            <i class="material-icons">share</i> Share file
          </button>
        </nav>
      </div>
      <main class="content">
        <div id="files" class="page">
          <h1>Welcome to all your files</h1>
        </div>
        <div id="documents" class="page">
          <h1>Here are all your douments</h1>
        </div>
        <div id="media" class="page">
          <h1>Here is all your media</h1>
        </div>
        <div id="archive" class="page">
          <h1>Here is your archive</h1>
        </div>
        <div id="trash" class="page">
          <h1>Here is your trash</h1>
        </div>
      </main>
      <footer class="footer"></footer>
    </div>
    <script src="../../js/dashboard.js" type="module"></script>
    <div
      id="popup-overlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
      "
    >
      <div
        style="
          background: white;
          padding: 30px;
          border-radius: 8px;
          width: 400px;
          margin: 100px auto;
          display: flex;
          flex-direction: column;
          gap: 10px;
        "
      >
        <h2>Share file</h2>

        <label>Filename</label>
        <input id="share-filename" placeholder="" />

        <label>User</label>
        <input id="share-user" placeholder="" />

        <label>Access</label>
        <select id="share-relation">
          <option value="viewer">Viewer – can only read</option>
          <option value="editor">Editor – can edit</option>
        </select>

        <p id="share-message"></p>

        <button id="share-save-btn">Share</button>
        <button id="share-close-btn">Cancel</button>
      </div>
    </div>
  </body>
</html>
