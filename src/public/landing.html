<!doctype html>
<html lang="en">
  <head>
    <script src="auth.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="landing.css" />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
  />
  <body>
    <div class="dashboard">
      <div class="navbar">
        <header class="header">
          <a href="/" id="logo">
            <i class="material-icons" id="shield">shield</i>
            <h2>HS Storage</h2>
          </a>
          <nav>
            <ul>
              <li><a href="#">Recent</a></li>
              <li><a href="#">Shared</a></li>
              <li><a href="#">Starred</a></li>
            </ul>
          </nav>
        </header>
      </div>
      <div class="box">
        <div class="login">
          <label for="username"><b>Login here</b></label>
          <form>
            <input
              class="username"
              type="text"
              id="usernameInput"
              placeholder="Enter Username"
              name="username"
              required
              minlength="2"
              size="20"
            />
            <button
              type="submit"
              onclick="Redirect()"
              class="button"
              id="LoginBtn"
            >
              Login
            </button>
            <p id="ErrorMsg" class="error"></p>
          </form>
        </div>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
