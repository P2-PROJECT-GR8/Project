      <div class="box">

        <div class="login">
          <form>
            <h2>Log In</h2>
            <label for="username">Username</label>
            <input

              type="text"
              id="usernameInput"
              placeholder="Username"
              name="username"
              required
              minlength="2"
              size="20"
            />
            <!-- <button type="submit" class="button" id="LoginBtn">Login</button> -->
            <button type="submit" class="button btn-lift" id="createSession">
              Log In
            </button>
            <p id="redirect">
              Don't have an account? <a href="/">Create an account</a>
            </p>
            <p id="ErrorMsg" class="error"></p>
          </form>
        </div>
      </div>
